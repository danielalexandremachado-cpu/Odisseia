<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pressagios Sombrios - Visões de Lutheria</title>
    <style>
        body { 
            margin: 0; 
            background: black; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Estilo para o Vídeo */
        .video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            outline: none; /* Remove a borda de seleção em alguns navegadores */
        }

        .back-btn {
            position: absolute; 
            top: 20px; 
            left: 20px;
            color: white; 
            text-decoration: none; 
            background: rgba(0,0,0,0.5);
            padding: 10px; 
            border-radius: 5px;
            z-index: 10;
            font-family: sans-serif;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(197, 160, 89, 0.7);
        }
    </style>
</head>
<body>

    <a href="Odisseia.html" class="back-btn">⬅ Voltar</a>

    <div class="video-container">
        <video autoplay playsinline controls>
            <source src="videos/Pesadelo1.mp4" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
    </div>
    
</body>
</html>
